version: '3'

# Build & deploy the Godot HTML5 build to itch.io (free) via butler.

vars:
  PROJECT_NAME: quarante-cinquante       # used for the manual-upload zip name
  GODOT: godot                           # Godot 4 binary on PATH
  GODOT_VERSION: 4.6.2                    # must match the editor binary exactly
  EXPORT_PRESET: Web                      # name in export_presets.cfg
  BUILD_DIR: build
  TEMPLATES_DIR: '{{.HOME}}/.local/share/godot/export_templates/{{.GODOT_VERSION}}.stable'
  ITCH_TARGET: bauagonzo/quarante-cinquante  # itch.io <user>/<game> — create the page first
  ITCH_CHANNEL: html5

tasks:
  default:
    cmds:
      - task --list
    silent: true

  templates:
    desc: Download & install matching Godot export templates (run once)
    status:
      - test -f "{{.TEMPLATES_DIR}}/web_nothreads_release.zip"
    cmds:
      - rm -rf /tmp/godot-tpl && mkdir -p /tmp/godot-tpl
      - curl -fL -o /tmp/godot-tpl/templates.tpz "https://github.com/godotengine/godot/releases/download/{{.GODOT_VERSION}}-stable/Godot_v{{.GODOT_VERSION}}-stable_export_templates.tpz"
      - unzip -q -o /tmp/godot-tpl/templates.tpz -d /tmp/godot-tpl
      - mkdir -p "{{.TEMPLATES_DIR}}"
      - cp -f /tmp/godot-tpl/templates/* "{{.TEMPLATES_DIR}}/"

  import:
    desc: Import project resources (headless)
    cmds:
      - '{{.GODOT}} --headless --import'

  sprites:
    desc: 'Re-import character sprites from assets/sprites/lpc_src/ (all, or e.g. task sprites -- robot)'
    cmds:
      - 'python3 tools/import_characters.py {{.CLI_ARGS}}'

  bg:
    desc: 'Generate one desert background, e.g. task bg -- --out assets/bg_desert_05.png --theme night --seed 3'
    cmds:
      - 'python3 tools/gen_desert_bg.py {{.CLI_ARGS}}'

  backgrounds:
    desc: Regenerate the per-level desert backgrounds (edit themes/seeds here to retune levels)
    cmds:
      # L1 keeps the approved look (theme=dusk, seed=0 -> byte-stable defaults)
      - python3 tools/gen_desert_bg.py --out assets/bg_desert.png
      - python3 tools/gen_desert_bg.py --out assets/bg_desert_02.png --theme noon  --seed 2
      - python3 tools/gen_desert_bg.py --out assets/bg_desert_03.png --theme dawn  --seed 5
      - python3 tools/gen_desert_bg.py --out assets/bg_desert_04.png --theme night --seed 9
      - python3 tools/gen_desert_bg.py --clouds assets/bg_desert_clouds.png   # drifting-cloud layer
      - '{{.GODOT}} --headless --import'

  build:
    desc: Export the Web build to {{.BUILD_DIR}}/
    deps: [import, templates]
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - '{{.GODOT}} --headless --export-release "{{.EXPORT_PRESET}}" {{.BUILD_DIR}}/index.html'

  serve:
    desc: Preview the build locally over HTTP
    deps: [build]
    cmds:
      - python3 -m http.server 8060 --directory {{.BUILD_DIR}}

  clean:
    desc: Remove the build output
    cmds:
      - rm -rf {{.BUILD_DIR}}

  # --- itch.io (free) ---------------------------------------------------------
  # Primary host. The HTML5 (nothreads) build runs without COOP/COEP, so no
  # special headers are needed — itch.io serves it as a playable web game.
  itch:login:
    desc: Authenticate butler with itch.io (one-time)
    cmds:
      - butler login

  itch:push:
    desc: Build and push the HTML5 build to itch.io
    deps: [build]
    cmds:
      - butler push {{.BUILD_DIR}} {{.ITCH_TARGET}}:{{.ITCH_CHANNEL}}

  itch:status:
    desc: Show itch.io channel/build status
    cmds:
      - butler status {{.ITCH_TARGET}}

  itch:zip:
    desc: Zip the build for manual upload via the itch.io web UI
    deps: [build]
    cmds:
      - rm -f {{.PROJECT_NAME}}-web.zip
      - cd {{.BUILD_DIR}} && zip -qr ../{{.PROJECT_NAME}}-web.zip .
      - 'echo "Created {{.PROJECT_NAME}}-web.zip — upload it on itch.io and tick \"This file will be played in the browser\"."'

  deploy:
    desc: Build and publish to production (itch.io)
    cmds:
      - task: itch:push
